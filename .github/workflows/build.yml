name: Java CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - uses: actions/checkout@v3

      # Set up JDK 17 with required distribution
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin   # <-- REQUIRED
          java-version: '17'

      # Compile all Java files
      - name: Compile Java code
        run: javac **/*.java
